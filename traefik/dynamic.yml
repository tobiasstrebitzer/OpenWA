# Traefik Dynamic Configuration
#
# The dashboard SPA is bundled into and served by openwa-api (NestJS) on the same port,
# so every route - UI, /api, and /socket.io - goes to the single api service. Traefik
# stays as the optional public entry point (TLS termination / single front-door).
http:
  routers:
    openwa:
      rule: 'PathPrefix(`/`)'
      entryPoints:
        - web
      service: api

  services:
    api:
      loadBalancer:
        servers:
          - url: 'http://openwa-api:2785'
